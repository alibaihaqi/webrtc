apiVersion: apps/v1
kind: Deployment
metadata:
  name: webrtc-signaling
  namespace: webrtc
  labels:
    app: webrtc-signaling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webrtc-signaling
  template:
    metadata:
      labels:
        app: webrtc-signaling
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: signaling
          image: ghcr.io/alibaihaqi/webrtc-signaling:latest
          ports:
            - containerPort: 3001
              name: ws
              protocol: TCP
          env:
            - name: WS_PORT
              value: "3001"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: webrtc-config
                  key: redis-url
            - name: COTURN_HOST
              valueFrom:
                configMapKeyRef:
                  name: webrtc-config
                  key: coturn-host
            - name: COTURN_PORT
              valueFrom:
                configMapKeyRef:
                  name: webrtc-config
                  key: coturn-port
            - name: TURN_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: webrtc-secrets
                  key: turn-secret-key
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: webrtc-config
                  key: cors-origin
            - name: ELASTIC_APM_ENABLED
              value: "false"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
