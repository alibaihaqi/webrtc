# webrtc-secrets
#
# This file documents the required Kubernetes Secret but does NOT contain
# the actual secret value. Create the secret manually before deploying:
#
#   kubectl create secret generic webrtc-secrets \
#     --namespace webrtc \
#     --from-literal=turn-secret-key=YOUR_ACTUAL_SECRET
#
# Alternatively, use a sealed-secret or external-secrets operator for
# production deployments. Never commit the real secret value to git.
#
# The Secret must contain:
#   turn-secret-key: <HMAC-SHA1 shared secret used by coturn TURN server>
