services:
  signaling:
    build: .
    ports:
      - "3001:3001"
    environment:
      - WS_PORT=3001
      - REDIS_URL=redis://redis:6379
      - COTURN_HOST=coturn
      - COTURN_PORT=3478
      - TURN_SECRET_KEY=${TURN_SECRET_KEY:-dev-secret-key}
      - ELASTIC_APM_ENABLED=false
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  coturn:
    image: coturn/coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf
    restart: unless-stopped

volumes:
  redis-data:
